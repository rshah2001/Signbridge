<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2E5A44" />
    <meta
      name="description"
      content="SignBridge AI is a real-time accessibility app for translating between speech, text, and sign-supported communication."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>SignBridge AI</title>
    <script>
      window.addEventListener(
        "error",
        function (event) {
          if (
            event.error instanceof DOMException &&
            event.error.name === "DataCloneError" &&
            event.message &&
            event.message.includes("PerformanceServerTiming")
          ) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        },
        true,
      );
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run SignBridge AI.</noscript>
    <div id="root"></div>
  </body>
</html>
